name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Decode and install keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > ~/.android/debug.keystore

      - name: Build APKs
        run: |
          gradle assembleDebug
          gradle assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: signboard-debug
          path: build/outputs/apk/debug/Signboard-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: signboard-release
          path: build/outputs/apk/release/Signboard-release.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/outputs/apk/debug/Signboard-debug.apk
            build/outputs/apk/release/Signboard-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
