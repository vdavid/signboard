name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # Uses the wrapper, not the runner's `gradle`, so CI and local builds run the same
      # Gradle. AGP 9 is strict about this: it rejects Gradle versions either side of a
      # narrow range, and the runner's version is not ours to control.
      - uses: gradle/actions/setup-gradle@v4

      # Optional. Without it the release APK is built unsigned, which is still enough to
      # verify minification, lint, and size. Add a SIGNBOARD_RELEASE_KEYSTORE secret
      # (base64 of ~/.android/signboard-release.keystore) to get an installable artifact.
      - name: Decode release keystore
        id: keystore
        env:
          KEYSTORE: ${{ secrets.SIGNBOARD_RELEASE_KEYSTORE }}
        run: |
          if [ -n "$KEYSTORE" ]; then
            mkdir -p ~/.android
            echo "$KEYSTORE" | base64 -d > ~/.android/signboard-release.keystore
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No release keystore secret; the release APK will be unsigned."
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check
        run: ./scripts/check.sh

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release bundle
        run: ./gradlew bundleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: signboard-apk
          path: |
            build/outputs/apk/debug/Signboard-debug.apk
            build/outputs/apk/release/Signboard-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: signboard-bundle
          path: build/outputs/bundle/release/Signboard-release.aab

      # Only publish artifacts anyone can actually install. An unsigned APK on a release
      # page is worse than no APK.
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') && steps.keystore.outputs.signed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/outputs/apk/release/Signboard-release.apk
            build/outputs/bundle/release/Signboard-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
